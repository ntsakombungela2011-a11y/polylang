name: Build PolyLang (Godot 4.6+)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

env:
  PLUGIN_DIR: "polylang plugin"
  ADDON_NAME: "polylang"
  NDK_VERSION: "27.0.12077973"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            ext: .so
            build_dir: build_linux
          - os: windows-2022
            platform: windows
            ext: .dll
            build_dir: build_windows/Release
          - os: ubuntu-24.04
            platform: android
            ext: .so
            build_dir: build_android
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Linux Deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake pkg-config libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install CMake (Windows)
        if: matrix.platform == 'windows'
        run: choco install cmake -y

      - name: Configure
        run: |
          mkdir -p "${{ env.PLUGIN_DIR }}/${{ matrix.build_dir }}"
          cd "${{ env.PLUGIN_DIR }}/${{ matrix.build_dir }}"
          if [ "${{ matrix.platform }}" = "android" ]; then
            cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-23 -DCMAKE_BUILD_TYPE=Release -DPL_ENABLE_HARDENING=OFF -DPOLYLANG_BUILD_TESTS=OFF
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release -DPL_ENABLE_HARDENING=OFF -DPOLYLANG_BUILD_TESTS=OFF
          fi

      - name: Build
        run: cd "${{ env.PLUGIN_DIR }}/${{ matrix.build_dir }}" && cmake --build . --config Release --parallel 4

      - name: Package
        run: |
          mkdir -p pkg/addons/${{ env.ADDON_NAME }}/bin/${{ matrix.platform }}
          cp "${{ env.PLUGIN_DIR }}/addons/polylang/plugin.cfg" pkg/addons/${{ env.ADDON_NAME }}/ 2>/dev/null || true
          cp "${{ env.PLUGIN_DIR }}/${{ matrix.build_dir }}/polylang${{ matrix.ext }}" pkg/addons/${{ env.ADDON_NAME }}/bin/${{ matrix.platform }}/${{ env.ADDON_NAME }}${{ matrix.ext }} 2>/dev/null || true
          find "${{ env.PLUGIN_DIR }}" -name "*.gdextension" -exec cp {} pkg/addons/${{ env.ADDON_NAME }}/ \; 2>/dev/null || true
          cp -r "${{ env.PLUGIN_DIR }}/addons/polylang/"* pkg/addons/${{ env.ADDON_NAME }}/ 2>/dev/null || true
          zip -r polylang-${{ matrix.platform }}.zip pkg/

      - uses: actions/upload-artifact@v4
        with:
          name: polylang-${{ matrix.platform }}
          path: polylang-${{ matrix.platform }}.zip
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
