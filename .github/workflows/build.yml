# =============================================================
# .github/workflows/build.yml  —  PolyLang v6.7
# Single unified CI — replaces build.yml + odin.yml
# =============================================================
#
# Job graph:
#
#   build-linux  ──────────────────────────────────────────┐
#        │                                                  │
#        ├──► test-odin-dlopen   (unit tests, dlopen mode) │
#        │                                                  │
#        └──► test-sandbox-escape (Odin sandbox escape)    │
#                                                           ▼
#   build-android ────────────────────────────────► release-package
#                                                   (main branch only)
#   build-windows   (standalone)
#
# =============================================================

name: PolyLang CI

on:
  push:
    branches: [ main, develop, 'release/**' ]
    paths:
      - 'polylang plugin/src/**'
      - 'polylang plugin/include/**'
      - 'polylang plugin/adapters/**'
      - 'polylang plugin/tests/**'
      - 'polylang plugin/CMakeLists.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'polylang plugin/src/**'
      - 'polylang plugin/include/**'
      - 'polylang plugin/adapters/**'
      - 'polylang plugin/tests/**'
      - 'polylang plugin/CMakeLists.txt'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_CPP_REF: "4.2"
  ANDROID_API:   "28"
  ANDROID_ABI:   "arm64-v8a"

# ==============================================================
# JOB 1 — Linux x86_64
# ==============================================================
jobs:
  build-linux:
    name: "Build — Linux x86_64"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: "polylang plugin"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # godot-cpp is NOT a submodule in this repo — clone it manually and pin to a specific commit
      - name: Clone godot-cpp (pinned)
        run: |
          set -euo pipefail
          git clone https://github.com/godotengine/godot-cpp.git godot-cpp
          cd godot-cpp
          git checkout 4bc6e67d51df4c12e150fe4769911e239c627a47

      - name: Cache godot-cpp build (Linux)
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: polylang plugin/godot-cpp/bin
          key: godot-cpp-linux-gcc12-${{ env.GODOT_CPP_REF }}-${{ hashFiles('polylang plugin/godot-cpp/CMakeLists.txt') }}
          restore-keys: godot-cpp-linux-gcc12-${{ env.GODOT_CPP_REF }}-

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc-12 g++-12 \
            liblua5.4-dev python3-dev binutils
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          # QuickJS is optional — log result but don't fail
          if ! sudo apt-get install -y libquickjs-dev; then
            echo "::notice::libquickjs-dev not available — JS/TS adapter will be skipped"
          fi

      - name: Verify compiler version
        run: |
          set -euo pipefail
          echo "GCC: $(gcc --version | head -1)"
          echo "G++: $(g++ --version | head -1)"
          gcc --version | grep -q "12\." || { echo "FATAL: Expected GCC 12"; exit 1; }

      - name: CMake configure
        run: |
          set -euo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPOLYLANG_BUILD_ODIN_ADAPTER=ON \
            -DPOLYLANG_BUILD_ODIN_TESTS=ON \
            -DPOLYLANG_BUILD_TESTS=ON \
            -DPOLYLANG_BUILD_SANDBOX_TESTS=OFF

      - name: Build core library
        run: |
          set -euo pipefail
          cmake --build build --target polylang -j$(nproc)

      - name: Build Odin adapter
        run: |
          set -euo pipefail
          cmake --build build --target polylang_odin -j$(nproc)

      # ZT-01: Removed || true — adapter targets that don't exist won't
      # be generated by CMake; any generated target MUST compile.
      - name: Build all available adapters
        run: |
          set -euo pipefail
          cmake --build build -j$(nproc)

      # ZT-03: Symbol verification is now FATAL on missing mandatory exports
      - name: Verify core library symbols
        run: |
          set -euo pipefail
          echo "=== Core library symbols ==="
          nm -D build/polylang.so | grep -E " T " | head -20
          echo ""
          echo "=== Checking polylang.so is a valid shared object ==="
          file build/polylang.so | grep -q "shared object" \
            || { echo "FATAL: polylang.so is not a valid shared object"; exit 1; }

      - name: Verify Odin adapter exports
        run: |
          set -euo pipefail
          echo "=== Odin adapter mandatory exports ==="
          MISSING=0
          for SYM in pl_get_vtable odin_fill_vtable odin_adapter_set_services; do
            if nm -D build/libpolylang_odin.so | grep -q " T ${SYM}"; then
              echo "✓ ${SYM} found"
            else
              echo "✗ ${SYM} MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "FATAL: mandatory Odin exports missing"
            exit 1
          fi

      - name: Run sidecar config tests
        run: |
          set -euo pipefail
          cmake --build build --target polylang_sidecar_tests -j$(nproc)
          ./build/polylang_sidecar_tests

      - name: Run Odin unit tests (static-link mode)
        run: |
          set -euo pipefail
          cmake --build build --target polylang_odin_tests -j$(nproc)
          mkdir -p /tmp/polylang_odin_cache
          ./build/polylang_odin_tests

      - name: Show built artifacts
        run: |
          set -euo pipefail
          echo "=== Built shared libraries ==="
          find build -name "*.so" -o -name "*.a" | sort
          # Verify at least the core .so exists
          test -f build/polylang.so || { echo "FATAL: polylang.so not found"; exit 1; }

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          mkdir -p ../dist_linux
          cp build/*.so ../dist_linux/
          cd ../dist_linux
          sha256sum * > SHA256SUMS.txt
          echo "=== Artifacts staged (with checksums) ==="
          ls -la

      # ZT-14: if-no-files-found: error prevents empty uploads
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: polylang-linux-x86_64
          retention-days: 14
          if-no-files-found: error
          path: dist_linux/

# ==============================================================
# JOB 2 — Android arm64-v8a API 28
# Uses the NDK already pre-installed on ubuntu-22.04 runners —
# no setup action needed, avoids the JDK 11 / sdkmanager issue.
# ==============================================================
  build-android:
    name: "Build — Android arm64-v8a (API 28)"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: "polylang plugin"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Clone godot-cpp (pinned)
        run: |
          set -euo pipefail
          git clone https://github.com/godotengine/godot-cpp.git godot-cpp
          cd godot-cpp
          git checkout 4bc6e67d51df4c12e150fe4769911e239c627a47

      # ZT-08: NDK discovery hardened to use latest environment-provided paths
      - name: Locate pre-installed NDK
        id: ndk
        run: |
          set -euo pipefail
          # Use the environment-provided ANDROID_NDK_LATEST_HOME if available
          NDK="${ANDROID_NDK_LATEST_HOME:-}"
          if [ -z "$NDK" ] || [ ! -f "$NDK/build/cmake/android.toolchain.cmake" ]; then
             NDK="$ANDROID_NDK_HOME"
          fi
          if [ -z "$NDK" ] || [ ! -f "$NDK/build/cmake/android.toolchain.cmake" ]; then
             NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | sort -V | tail -1)
          fi
          # ... existing version extractions ...
          NDK_VERSION="unknown"
          if [ -f "$NDK/source.properties" ]; then
            NDK_VERSION=$(grep 'Pkg.Revision' "$NDK/source.properties" | cut -d= -f2 | tr -d ' ')
          fi
          echo "NDK_HOME=$NDK" >> $GITHUB_OUTPUT
          echo "NDK_VERSION=$NDK_VERSION" >> $GITHUB_OUTPUT
          echo "Using NDK: $NDK (version: $NDK_VERSION)"

      # ZT-06: Cache key now includes NDK version
      - name: Cache godot-cpp build (Android)
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: polylang plugin/godot-cpp/bin
          key: godot-cpp-android-ndk${{ steps.ndk.outputs.NDK_VERSION }}-api${{ env.ANDROID_API }}-${{ env.ANDROID_ABI }}-${{ env.GODOT_CPP_REF }}-${{ hashFiles('polylang plugin/godot-cpp/CMakeLists.txt') }}
          restore-keys: godot-cpp-android-ndk${{ steps.ndk.outputs.NDK_VERSION }}-api${{ env.ANDROID_API }}-${{ env.ANDROID_ABI }}-

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build

      - name: CMake configure (Android)
        run: |
          set -euo pipefail
          cmake -B build_android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.NDK_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_STL=c++_shared \
            -DPOLYLANG_BUILD_ODIN_ADAPTER=ON \
            -DPOLYLANG_BUILD_TESTS=OFF

      - name: Build core + Odin adapter
        run: |
          set -euo pipefail
          cmake --build build_android -j$(nproc)

      - name: Verify aarch64 ELF
        run: |
          set -euo pipefail
          echo "=== Core library ==="
          file build_android/polylang.so
          file build_android/polylang.so | grep -q "aarch64" \
            && echo "✓ aarch64 confirmed" \
            || { echo "✗ Wrong architecture!"; exit 1; }
          file build_android/polylang.so | grep -q "shared object" \
            || { echo "✗ Not a shared object!"; exit 1; }

      # ZT-04: Odin export verification is now FATAL
      - name: Verify Odin exports (Android)
        run: |
          set -euo pipefail
          LLVM=${{ steps.ndk.outputs.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "=== Odin adapter ELF check ==="
          file build_android/libpolylang_odin.so
          file build_android/libpolylang_odin.so | grep -q "aarch64" \
            || { echo "FATAL: Odin adapter wrong architecture"; exit 1; }
          echo "=== Odin adapter mandatory exports ==="
          MISSING=0
          for SYM in pl_get_vtable odin_fill_vtable; do
            if $LLVM/llvm-nm -D build_android/libpolylang_odin.so | grep -q " T ${SYM}"; then
              echo "✓ ${SYM} found"
            else
              echo "✗ ${SYM} MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "FATAL: mandatory Odin exports missing in Android build"
            exit 1
          fi

      # Verify no unresolved symbols that would cause runtime dlopen failure
      - name: Check for undefined symbols
        run: |
          set -euo pipefail
          LLVM=${{ steps.ndk.outputs.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "=== Undefined symbols in polylang.so ==="
          UNDEF=$($LLVM/llvm-nm -u build_android/polylang.so 2>/dev/null | grep -v "@@" | head -20 || true)
          if [ -n "$UNDEF" ]; then
            echo "$UNDEF"
            echo "::warning::polylang.so has undefined symbols (may be resolved at runtime)"
          fi

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          mkdir -p ../dist_android
          cp build_android/*.so ../dist_android/
          cd ../dist_android
          sha256sum * > SHA256SUMS.txt
          echo "=== Artifacts staged (with checksums) ==="
          ls -la

      - name: Upload Android artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: polylang-android-arm64-v8a
          retention-days: 30
          if-no-files-found: error
          path: dist_android/

# ==============================================================
# JOB 3 — Windows x64
# ==============================================================
  build-windows:
    name: "Build — Windows x64"
    runs-on: windows-2022
    permissions:
      contents: read
    defaults:
      run:
        working-directory: "polylang plugin"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Clone godot-cpp (pinned)
        run: |
          git clone https://github.com/godotengine/godot-cpp.git godot-cpp
          cd godot-cpp
          git checkout 4bc6e67d51df4c12e150fe4769911e239c627a47
        shell: pwsh

      # ZT-07: Fixed cache path to include working-directory prefix
      - name: Cache godot-cpp build (Windows)
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: polylang plugin/godot-cpp/bin
          key: godot-cpp-windows-msvc2022-${{ env.GODOT_CPP_REF }}-${{ hashFiles('polylang plugin/godot-cpp/CMakeLists.txt') }}
          restore-keys: godot-cpp-windows-msvc2022-${{ env.GODOT_CPP_REF }}-

      - name: CMake configure (MSVC)
        shell: pwsh
        run: |
          cmake -B build_win `
            -DCMAKE_BUILD_TYPE=Release `
            -DPOLYLANG_BUILD_ODIN_ADAPTER=OFF `
            -DPOLYLANG_BUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build_win --config Release -j4

      - name: Verify outputs
        shell: pwsh
        run: |
          if (-not (Test-Path build_win/Release/polylang.dll)) {
            Write-Error "FATAL: polylang.dll not found"
            exit 1
          }
          Write-Host "✓ polylang.dll exists"

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ../dist_win -Force | Out-Null
          Copy-Item build_win/Release/polylang.dll ../dist_win/
          Copy-Item build_win/Release/polylang.lib ../dist_win/ -ErrorAction SilentlyContinue
          cd ../dist_win
          Get-FileHash * -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.FileName)" } > SHA256SUMS.txt
          Get-ChildItem

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: polylang-windows-x64
          retention-days: 14
          if-no-files-found: error
          path: dist_win/

# ==============================================================
# JOB 4 — Odin dlopen tests
# Needs: build-linux
# ==============================================================
  test-odin-dlopen:
    name: "Test — Odin adapter (dlopen)"
    runs-on: ubuntu-22.04
    needs: build-linux
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: "polylang plugin"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ZT-09: Removed libdl-dev (dlopen lives in libc6-dev, already present)
      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends g++

      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: polylang-linux-x86_64
          path: polylang plugin/build/

      - name: Verify downloaded artifacts
        run: |
          set -euo pipefail
          test -f build/libpolylang_odin.so \
            || { echo "FATAL: libpolylang_odin.so not found in downloaded artifacts"; exit 1; }
          file build/libpolylang_odin.so | grep -q "shared object" \
            || { echo "FATAL: downloaded artifact is not a valid shared object"; exit 1; }

      - name: Build test binary
        run: |
          set -euo pipefail
          g++ -std=c++20 -I include \
              tests/odin_adapter_test.cpp \
              adapters/odin/polylang_odin_adapter.cpp \
              adapters/odin/polylang_odin_shim.c \
              -o odin_adapter_tests \
              -lpthread -ldl

      # ZT-21: Removed chmod +x on .so — shared libraries are not executables
      - name: Run tests (dlopen mode)
        run: |
          set -euo pipefail
          mkdir -p /tmp/polylang_odin_cache
          POLYLANG_ODIN_ADAPTER_SO=build/libpolylang_odin.so \
            ./odin_adapter_tests build/libpolylang_odin.so
          echo "Exit: $?"

# ==============================================================
# JOB 5 — Odin sandbox escape tests
# Needs: build-linux
# ==============================================================
  test-sandbox-escape:
    name: "Test — Odin sandbox escape"
    runs-on: ubuntu-22.04
    needs: build-linux
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: "polylang plugin"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ZT-15 + DZ-02: Using a pinned release tag and strictly verifying its cryptographic hash
      - name: Install Odin compiler (Verified Release)
        id: odin
        run: |
          set -uo pipefail
          ODIN_VERSION="dev-2024-05"
          ODIN_URL="https://github.com/odin-lang/Odin/releases/download/${ODIN_VERSION}/odin-ubuntu-amd64-${ODIN_VERSION}.zip"
          EXPECTED_HASH="fa6447833075c353909772bf6241b777a80b7b13766699eb31682855b77840ec"
          
          curl -fsSL "$ODIN_URL" -o odin.zip
          echo "$EXPECTED_HASH  odin.zip" | sha256sum -c - || { echo "FATAL: Odin compiler hash mismatch!"; exit 1; }
          
          unzip -q odin.zip -d odin_install
          echo "$(pwd)/odin_install" >> $GITHUB_PATH
          echo "available=true" >> $GITHUB_OUTPUT
          echo "Odin compiler installed and verified"

      # ZT-09: Removed libdl-dev
      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends g++

      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: polylang-linux-x86_64
          path: polylang plugin/build/

      - name: Verify downloaded artifacts
        run: |
          set -euo pipefail
          test -f build/libpolylang_odin.so \
            || { echo "FATAL: libpolylang_odin.so not in downloaded artifacts"; exit 1; }

      - name: Build sandbox test binary
        run: |
          set -euo pipefail
          g++ -std=c++20 -I include \
              tests/sandbox_escape_test.cpp \
              adapters/odin/polylang_odin_adapter.cpp \
              adapters/odin/polylang_odin_shim.c \
              -o sandbox_escape_tests \
              -lpthread -ldl

      - name: Compile malicious Odin test script
        if: steps.odin.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/odin_sandbox_test
          cat > /tmp/odin_sandbox_test/EscapeTest.pl.odin << 'ODIN'
          package main
          import pl "polylang"
          import "core:c"
          import "core:os"
          EscapeScript :: struct { using script: pl.OdinScript }
          escape_create :: proc() -> ^EscapeScript {
            e := new(EscapeScript)
            e._vtable = { call_method = escape_call }
            return e
          }
          escape_call :: proc(inst: rawptr, name: cstring,
                              args: [^]pl.PLValue, argc: c.int32_t,
                              ret: ^pl.PLValue) -> c.int {
            switch string(name) {
            case "os_open":
              _ = os.open("/tmp/sandbox_escape_test_FILE", os.O_CREATE, 0o644)
              ret^ = pl.make_bool(true)
              return pl.PL_OK
            case "safe_method":
              ret^ = pl.make_int(42)
              return pl.PL_OK
            }
            return pl.PL_ERR_METHOD_NOT_FOUND
          }
          @(init)
          reg :: proc() {
            polylang_script_factory = proc "c" () -> rawptr { return escape_create() }
          }
          ODIN
          POLYLANG_ODIN_SHIM_PATH=adapters/odin \
          POLYLANG_ODIN_CACHE=/tmp/odin_sandbox_test \
          ODIN_BIN=odin \
            bash adapters/odin/odin_build_pipeline.sh \
            /tmp/odin_sandbox_test/EscapeTest.pl.odin \
            /tmp/odin_sandbox_test/EscapeTest.pl.odin.so \
          || echo "::warning::Odin compile failed — structural test only"

      - name: Run sandbox escape test
        run: |
          set -euo pipefail
          mkdir -p /tmp/polylang_odin_cache
          ./sandbox_escape_tests
          echo "Exit: $?"

      - name: Verify no escape artifact
        run: |
          set -euo pipefail
          if [ -f /tmp/sandbox_escape_test_FILE ]; then
            echo "FAIL: sandbox escape detected"
            exit 1
          fi
          echo "PASS: no escape artifact found"

# ==============================================================
# JOB 6 — Release package (main branch push only)
# Needs: build-linux, build-android
# ==============================================================
  release-package:
    name: "Package — Godot addon zip"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    needs: [ build-linux, build-android, build-windows ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: polylang-linux-x86_64
          path: release/linux

      - name: Download Android artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: polylang-android-arm64-v8a
          path: release/android

      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: polylang-windows-x64
          path: release/windows

      - name: Verify downloaded artifacts
        run: |
          set -euo pipefail
          test -f release/linux/polylang.so \
            || { echo "FATAL: Linux polylang.so missing"; exit 1; }
          test -f release/android/polylang.so \
            || { echo "FATAL: Android polylang.so missing"; exit 1; }
          test -f release/windows/polylang.dll \
            || { echo "FATAL: Windows polylang.dll missing"; exit 1; }

      - name: Assemble Godot addon layout
        run: |
          set -euo pipefail
          mkdir -p godot_addon/addons/polylang/bin/linux
          mkdir -p godot_addon/addons/polylang/bin/android
          mkdir -p godot_addon/addons/polylang/bin/windows
          mkdir -p godot_addon/addons/polylang/include

          cp release/linux/polylang.so   godot_addon/addons/polylang/bin/linux/
          cp release/android/polylang.so godot_addon/addons/polylang/bin/android/
          cp release/windows/polylang.dll godot_addon/addons/polylang/bin/windows/

          cp release/linux/libpolylang_odin.so    godot_addon/addons/polylang/bin/linux/  2>/dev/null || true
          cp release/android/libpolylang_odin.so  godot_addon/addons/polylang/bin/android/ 2>/dev/null || true

          find release/linux -name "libpolylang_adapter_*.so" \
            -exec cp {} godot_addon/addons/polylang/bin/linux/ \; 2>/dev/null || true

          cp -r "polylang plugin/addons/polylang/." godot_addon/addons/polylang/ 2>/dev/null || true
          cp "polylang plugin/include/pl_adapter_vtable.h" godot_addon/addons/polylang/include/

          echo "=== Release layout ==="
          find godot_addon -type f | sort

      # ZT-16, DZ-09: Package with cryptographic manifest
      - name: Create addon zip and checksum
        run: |
          set -euo pipefail
          VERSION=$(grep "VERSION" "polylang plugin/CMakeLists.txt" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "FATAL: Could not extract VERSION from CMakeLists.txt"
            exit 1
          fi
          echo "Packaging version: $VERSION"
          cd godot_addon
          ZIP_NAME="polylang_v${VERSION}_addon.zip"
          zip -r "../$ZIP_NAME" addons/
          cd ..
          sha256sum "$ZIP_NAME" > "SHA256SUMS.txt"
          echo "=== SHA256 Checksum ==="
          cat "SHA256SUMS.txt"

      - name: Upload release package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: polylang-godot-addon
          retention-days: 90
          if-no-files-found: error
          path: |
            *.zip
            SHA256SUMS.txt
