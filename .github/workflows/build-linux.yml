name: PolyLang — Linux

on:
  push:
    branches: [main, master]
    paths:
      - 'polylang plugin/src/**'
      - 'polylang plugin/adapters/**'
      - 'polylang plugin/include/**'
      - 'polylang plugin/CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/build-linux.yml'
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

env:
  PLUGIN_DIR: "polylang plugin"
  BUILD_DIR:  build_linux
  VENDOR_INSTALL: ${{ github.workspace }}/vendor/install

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # godot-cpp fetched below as tarball

      # ── godot-cpp (tarball, cached by branch) ────────────────────────────
      - name: Detect godot-cpp branch
        id: gcpp
        run: |
          B=$(git ls-remote --symref https://github.com/godotengine/godot-cpp HEAD \
              | awk '/^ref:/{print $2}' | sed 's|refs/heads/||') || B="4.3"
          echo "branch=${B:-4.3}" >> $GITHUB_OUTPUT

      - name: Cache godot-cpp
        id: cache_gcpp
        uses: actions/cache@v4
        with:
          path: "${{ env.PLUGIN_DIR }}/godot-cpp"
          key: godot-cpp-linux-${{ steps.gcpp.outputs.branch }}-v1

      - name: Fetch godot-cpp
        if: steps.cache_gcpp.outputs.cache-hit != 'true'
        run: |
          B="${{ steps.gcpp.outputs.branch }}"
          mkdir -p "$PLUGIN_DIR/godot-cpp"
          curl -sL "https://github.com/godotengine/godot-cpp/archive/refs/heads/${B}.tar.gz" \
            | tar -xz --strip-components=1 -C "$PLUGIN_DIR/godot-cpp"

      # ── Minimal system tools only (no library installs) ──────────────────
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git \
            libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev \
            python3-dev \
            golang-go \
            dotnet-sdk-8.0 || true
          # Note: Nim and Julia are NOT installed via apt — they are downloaded
          # at pinned versions from vendor/nim-version and vendor/julia-version

      # ── Nim (pinned version from vendor) ─────────────────────────────────
      - name: Read Nim version pin
        id: nim_ver
        run: |
          V=$(cat vendor/nim-version/VERSION 2>/dev/null | tr -d '[:space:]') || V="2.0.8"
          echo "version=${V}" >> $GITHUB_OUTPUT

      - name: Cache Nim binary
        id: cache_nim
        uses: actions/cache@v4
        with:
          path: vendor/nim-bin
          key: nim-linux-${{ steps.nim_ver.outputs.version }}-v1

      - name: Download Nim ${{ steps.nim_ver.outputs.version }}
        if: steps.cache_nim.outputs.cache-hit != 'true'
        run: |
          VER="${{ steps.nim_ver.outputs.version }}"
          mkdir -p vendor/nim-bin
          curl -sL "https://nim-lang.org/download/nim-${VER}-linux_x64.tar.xz" \
            | tar -xJ --strip-components=1 -C vendor/nim-bin

      - name: Add Nim to PATH
        run: echo "${{ github.workspace }}/vendor/nim-bin/bin" >> $GITHUB_PATH

      # ── Julia (pinned version from vendor) ───────────────────────────────
      - name: Read Julia version pin
        id: julia_ver
        run: |
          V=$(cat vendor/julia-version/VERSION 2>/dev/null | tr -d '[:space:]') || V="1.10.4"
          echo "version=${V}" >> $GITHUB_OUTPUT

      - name: Cache Julia binary
        id: cache_julia
        uses: actions/cache@v4
        with:
          path: vendor/julia-bin
          key: julia-linux-${{ steps.julia_ver.outputs.version }}-v1

      - name: Download Julia ${{ steps.julia_ver.outputs.version }}
        if: steps.cache_julia.outputs.cache-hit != 'true'
        run: |
          VER="${{ steps.julia_ver.outputs.version }}"
          MM=$(echo "$VER" | cut -d. -f1-2)
          mkdir -p vendor/julia-bin
          curl -sL "https://julialang-s3.julialang.org/bin/linux/x64/${MM}/julia-${VER}-linux-x86_64.tar.gz" \
            | tar -xz --strip-components=1 -C vendor/julia-bin

      - name: Set JULIA_HOME
        run: echo "JULIA_HOME=${{ github.workspace }}/vendor/julia-bin" >> $GITHUB_ENV

      # ── Vendored C deps (Lua, QuickJS, Wren, Squirrel, AngelScript) ───────
      - name: Cache vendored deps
        id: cache_vendor
        uses: actions/cache@v4
        with:
          path: vendor/install
          key: vendor-linux-${{ hashFiles('vendor/CMakeLists.txt') }}-v5

      - name: Build vendored deps
        if: steps.cache_vendor.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S vendor \
            -B vendor/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${VENDOR_INSTALL}"
          cmake --build vendor/build --parallel
          cmake --install vendor/build

      # ── Rust adapter ─────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            polylang plugin/adapters/rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('polylang plugin/adapters/rust/Cargo.toml', 'polylang plugin/adapters/rust/src/**') }}
          restore-keys: rust-linux-

      - name: Build Rust adapter
        working-directory: "polylang plugin/adapters/rust"
        run: cargo build --release
        continue-on-error: true

      # ── Zig adapter ───────────────────────────────────────────────────────
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
        continue-on-error: true

      - name: Build Zig adapter
        working-directory: "polylang plugin/adapters/zig"
        run: zig build -Doptimize=ReleaseSafe
        continue-on-error: true

      # ── Go adapter ────────────────────────────────────────────────────────
      - name: Build Go adapter
        working-directory: "polylang plugin/adapters/go"
        run: go build -buildmode=c-shared -o polylang_go_adapter.so ./polylang_go_adapter.go
        continue-on-error: true

      # ── Nim adapter ───────────────────────────────────────────────────────
      - name: Build Nim adapter
        working-directory: "polylang plugin/adapters/nim"
        run: nim c --app:lib --out:polylang_nim_adapter.so polylang_nim_adapter.nim
        continue-on-error: true

      # ── CMake configure (main build) ──────────────────────────────────────
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: "${{ env.PLUGIN_DIR }}/${{ env.BUILD_DIR }}"
          key: cmake-linux-${{ hashFiles('polylang plugin/CMakeLists.txt', 'polylang plugin/src/**', 'polylang plugin/include/**') }}-v2
          restore-keys: cmake-linux-

      - name: Configure
        run: |
          mkdir -p "$PLUGIN_DIR/$BUILD_DIR"
          cmake \
            -S "$PLUGIN_DIR" \
            -B "$PLUGIN_DIR/$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${VENDOR_INSTALL}" \
            -DLUA_INCLUDE_DIR="${VENDOR_INSTALL}/include/lua5.4" \
            -DLUA_LIBRARIES="${VENDOR_INSTALL}/lib/liblua5.4.so" \
            -DQUICKJS_INCLUDE="${VENDOR_INSTALL}/include" \
            -DQUICKJS_LIB="${VENDOR_INSTALL}/lib/libquickjs.so" \
            -DWREN_INC="${VENDOR_INSTALL}/include" \
            -DWREN_LIB="${VENDOR_INSTALL}/lib/libwren.so" \
            -DSQUIRREL_INC="${VENDOR_INSTALL}/include" \
            -DSQUIRREL_LIB="${VENDOR_INSTALL}/lib/libsquirrel.so" \
            -DAS_INC="${VENDOR_INSTALL}/include" \
            -DAS_LIB="${VENDOR_INSTALL}/lib/libangelscript.so" \
            -DAS_ADDONS_LIB="${VENDOR_INSTALL}/lib" \
            -DPL_ENABLE_HARDENING=OFF \
            -DPOLYLANG_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build "$PLUGIN_DIR/$BUILD_DIR" --config Release --parallel

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package
        run: |
          mkdir -p pkg/addons/polylang/bin/linux
          find "$PLUGIN_DIR/$BUILD_DIR" -maxdepth 3 -name "polylang.so" \
            -exec cp {} pkg/addons/polylang/bin/linux/ \;
          find "$PLUGIN_DIR/$BUILD_DIR" -maxdepth 3 -name "*.so" ! -name "polylang.so" \
            -exec cp {} pkg/addons/polylang/bin/linux/ \; 2>/dev/null || true
          cp -r "$PLUGIN_DIR/addons/polylang/"* pkg/addons/polylang/ 2>/dev/null || true
          echo "=== Linux package contents ==="
          find pkg -type f | sort
          zip -r polylang-linux.zip pkg/

      - name: Causinator 9000 CI Diagnosis
        if: failure()
        uses: sylvainsf/causinator9000@v1.6.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polylang-linux
          path: polylang-linux.zip
          retention-days: 30