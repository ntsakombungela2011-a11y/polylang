name: PolyLang — Windows

on:
  push:
    branches: [main, master]
    paths:
      - 'polylang plugin/src/**'
      - 'polylang plugin/adapters/**'
      - 'polylang plugin/include/**'
      - 'polylang plugin/CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  PLUGIN_DIR:     "polylang plugin"
  BUILD_DIR:      build_windows
  VENDOR_INSTALL: ${{ github.workspace }}\vendor\install-windows

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # ── godot-cpp ─────────────────────────────────────────────────────────
      # Use a pinned tag instead of dynamic branch detection —
      # git ls-remote parsing is unreliable on Windows PowerShell.
      - name: Cache godot-cpp
        id: cache_gcpp
        uses: actions/cache@v4
        with:
          path: "${{ github.workspace }}\\${{ env.PLUGIN_DIR }}\\godot-cpp"
          key: godot-cpp-windows-detected-v5

      - name: Fetch godot-cpp
        if: steps.cache_gcpp.outputs.cache-hit != 'true'
        run: |
          $dest = Join-Path "${{ github.workspace }}" "$env:PLUGIN_DIR\godot-cpp"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # Detect default branch to match Linux logic and get required 4.4+ headers
          $branch = (git ls-remote --symref https://github.com/godotengine/godot-cpp HEAD | Select-String 'ref: refs/heads/(.*)\s+HEAD').Matches[0].Groups[1].Value
          if (-not $branch) { $branch = "master" }
          $url = "https://github.com/godotengine/godot-cpp/archive/refs/heads/$branch.zip"
          Invoke-WebRequest $url -OutFile godot-cpp.zip -UseBasicParsing
          Expand-Archive godot-cpp.zip -DestinationPath _gcpp_tmp
          $inner = Get-ChildItem _gcpp_tmp | Select-Object -First 1
          Get-ChildItem $inner.FullName | Move-Item -Destination $dest
          Remove-Item _gcpp_tmp, godot-cpp.zip -Recurse -Force

      # ── Vendored C deps (Lua, QuickJS, Wren, Squirrel, AngelScript) ───────
      - name: Cache vendored deps (Windows)
        id: cache_vendor
        uses: actions/cache@v4
        with:
          path: vendor\install-windows
          key: vendor-windows-${{ hashFiles('vendor/CMakeLists.txt', 'vendor/quickjs/quickjs.h') }}-v4

      - name: Verify vendored deps (Windows)
        id: verify_vendor
        run: |
          $required = @(
            "$env:VENDOR_INSTALL\include\quickjs\quickjs.h",
            "$env:VENDOR_INSTALL\lib\quickjs.lib",
            "$env:VENDOR_INSTALL\lib\lua54.lib",
            "$env:VENDOR_INSTALL\lib\wren.lib",
            "$env:VENDOR_INSTALL\lib\squirrel.lib",
            "$env:VENDOR_INSTALL\lib\angelscript.lib"
          )

          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            Write-Host "Vendored dependency cache is incomplete:"
            $missing | ForEach-Object { Write-Host "  $_" }
            if (Test-Path 'vendor\build-windows') { Remove-Item 'vendor\build-windows' -Recurse -Force }
            if (Test-Path $env:VENDOR_INSTALL) { Remove-Item $env:VENDOR_INSTALL -Recurse -Force }
            "vendor_ready=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Vendored dependency cache is complete."
            "vendor_ready=true" >> $env:GITHUB_OUTPUT
          }

      - name: Build vendored deps (Windows)
        # Always run vendored deps build to ensure required libraries
        # are present for the plugin build. This avoids cache races
        # where cache claims to be valid but artifacts are missing.
        run: |
          # Create shims for missing POSIX headers required by QuickJS on Windows/MSVC
          New-Item -ItemType Directory -Force -Path "vendor/msvc_shim/sys" | Out-Null

          @"
          #ifndef MSVC_UTIME_H
          #define MSVC_UTIME_H
          #include <sys/utime.h>
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/utime.h"

          @"
          #ifndef MSVC_DIRENT_H
          #define MSVC_DIRENT_H
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <windows.h>
          #include <stdio.h>
          #include <stdlib.h>
          typedef struct dirent {
              char d_name[MAX_PATH];
          } dirent;
          typedef struct DIR {
              HANDLE hFind;
              WIN32_FIND_DATAA fd;
              dirent ent;
              int first;
          } DIR;
          static inline DIR* opendir(const char* name) {
              DIR* dir = (DIR*)malloc(sizeof(DIR));
              char path[MAX_PATH];
              snprintf(path, MAX_PATH, "%s\\*", name);
              dir->hFind = FindFirstFileA(path, &dir->fd);
              if (dir->hFind == INVALID_HANDLE_VALUE) { free(dir); return NULL; }
              dir->first = 1;
              return dir;
          }
          static inline struct dirent* readdir(DIR* dir) {
              if (dir->first) { dir->first = 0; }
              else if (!FindNextFileA(dir->hFind, &dir->fd)) return NULL;
              strncpy(dir->ent.d_name, dir->fd.cFileName, MAX_PATH);
              return &dir->ent;
          }
          static inline void closedir(DIR* dir) {
              if (dir->hFind != INVALID_HANDLE_VALUE) FindClose(dir->hFind);
              free(dir);
          }
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/dirent.h"

          @"
          #ifndef MSVC_SYS_WAIT_H
          #define MSVC_SYS_WAIT_H
          #define WIFEXITED(s) (1)
          #define WEXITSTATUS(s) (s)
          #define WIFSIGNALED(s) (0)
          #define WTERMSIG(s) (0)
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/sys/wait.h"
          @"
          #ifndef MSVC_UNISTD_H
          #define MSVC_UNISTD_H
          #include <io.h>
          #include <stdint.h>
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <process.h>
          #include <direct.h>
          #include <windows.h>
          #define STDIN_FILENO 0
          #define STDOUT_FILENO 1
          #define STDERR_FILENO 2
          #if defined(_WIN64)
          typedef int64_t ssize_t;
          #else
          typedef int32_t ssize_t;
          #endif
          static inline void usleep(unsigned int us) { Sleep(us / 1000); }
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/unistd.h"

          @"
          #ifndef MSVC_POSIX_FIXUP_H
          #define MSVC_POSIX_FIXUP_H
          #include <stdio.h>
          #include <sys/stat.h>
          #include <stdint.h>

          #define popen _popen
          #define pclose _pclose

          #ifndef S_ISDIR
          #define S_ISDIR(m) (((m) & _S_IFMT) == _S_IFDIR)
          #endif
          #ifndef S_ISREG
          #define S_ISREG(m) (((m) & _S_IFMT) == _S_IFREG)
          #endif

          #if defined(_WIN64)
          typedef int64_t ssize_t;
          #else
          typedef int32_t ssize_t;
          #endif
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/msvc_posix_fixup.h"

          @"
          #ifndef MSVC_SYS_TIME_H
          #define MSVC_SYS_TIME_H
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <winsock2.h>
          #include <windows.h>
          #include <time.h>
          // winsock2.h defines struct timeval, so we don't define it here.
          static inline int gettimeofday(struct timeval *tp, void *tzp) {
              if (tp) {
                  FILETIME ft; unsigned __int64 t;
                  GetSystemTimeAsFileTime(&ft);
                  t = ((unsigned __int64)ft.dwHighDateTime << 32) | (unsigned __int64)ft.dwLowDateTime;
                  t -= 116444736000000000LL;
                  tp->tv_sec = (long)(t / 10000000ULL);
                  tp->tv_usec = (long)((t % 10000000ULL) / 10ULL);
              }
              return 0;
          }
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/sys/time.h"

          @"
          #ifndef MSVC_PTHREAD_H
          #define MSVC_PTHREAD_H
          #ifndef WIN32_LEAN_AND_MEAN
          #define WIN32_LEAN_AND_MEAN
          #endif
          #include <windows.h>
          #include <time.h>
          // corecrt_wtime.h defines struct timespec, we skip redefining it.
          typedef void* pthread_t;
          typedef void* pthread_mutex_t;
          typedef void* pthread_cond_t;
          typedef void* pthread_attr_t;
          typedef void* pthread_mutexattr_t;
          typedef void* pthread_condattr_t;
          #define PTHREAD_MUTEX_INITIALIZER {0}
          #define PTHREAD_CREATE_DETACHED 1
          #define CLOCK_REALTIME 0
          static inline int clock_gettime(int clk_id, struct timespec *tp) { return 0; }
          static inline int pthread_mutex_init(pthread_mutex_t* m, void* a) { return 0; }
          static inline int pthread_mutex_destroy(pthread_mutex_t* m) { return 0; }
          static inline int pthread_mutex_lock(pthread_mutex_t* m) { return 0; }
          static inline int pthread_mutex_unlock(pthread_mutex_t* m) { return 0; }
          static inline int pthread_cond_init(pthread_cond_t* c, void* a) { return 0; }
          static inline int pthread_cond_destroy(pthread_cond_t* c) { return 0; }
          static inline int pthread_cond_signal(pthread_cond_t* c) { return 0; }
          static inline int pthread_cond_broadcast(pthread_cond_t* c) { return 0; }
          static inline int pthread_cond_wait(pthread_cond_t* c, pthread_mutex_t* m) { return 0; }
          static inline int pthread_cond_timedwait(pthread_cond_t* c, pthread_mutex_t* m, const struct timespec* t) { return 0; }
          static inline int pthread_create(pthread_t* t, void* a, void* (*f)(void*), void* p) { return 0; }
          static inline int pthread_join(pthread_t t, void** r) { return 0; }
          static inline int pthread_attr_init(pthread_attr_t* a) { return 0; }
          static inline int pthread_attr_setdetachstate(pthread_attr_t* a, int s) { return 0; }
          static inline int pthread_attr_destroy(pthread_attr_t* a) { return 0; }
          #endif
          "@ | Set-Content -Path "vendor/msvc_shim/pthread.h"

          Set-Content -Path "vendor/msvc_shim/sched.h" -Value ""

          $v = (Resolve-Path vendor).Path.Replace('\', '/')
          $shim = (Get-Item vendor/msvc_shim).FullName.Replace('\','/')
          cmake `
            -S vendor `
            -B vendor\build-windows `
            -G "Visual Studio 17 2022" `
            -T ClangCL `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:VENDOR_INSTALL" `
            -DCMAKE_PROJECT_INCLUDE="$v/CMakeLists.windows.cmake" `
            -DCMAKE_C_FLAGS="-I$shim -D_CRT_SECURE_NO_WARNINGS -DCONFIG_WIN32 -Dalloca=_alloca /FI malloc.h /FI $shim/msvc_posix_fixup.h" `
            -DCMAKE_CXX_FLAGS="-D_CRT_SECURE_NO_WARNINGS"
          cmake --build vendor\build-windows --config Release --parallel
          cmake --install vendor\build-windows --config Release

      # ── Rust adapter ─────────────────────────────────────────────────────
      - name: Cache Rust (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PLUGIN_DIR }}\adapters\rust\target
            ~\.cargo\registry
            ~\.cargo\git
          key: rust-windows-${{ hashFiles('polylang plugin/adapters/rust/Cargo.toml', 'polylang plugin/adapters/rust/src/**') }}
          restore-keys: rust-windows-

      - name: Build Rust adapter (Windows)
        working-directory: "${{ env.PLUGIN_DIR }}\\adapters\\rust"
        run: cargo build --release
        continue-on-error: true

      # ── Zig adapter ───────────────────────────────────────────────────────
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
        continue-on-error: true

      - name: Build Zig adapter (Windows)
        working-directory: "${{ env.PLUGIN_DIR }}\\adapters\\zig"
        run: zig build -Doptimize=ReleaseSafe
        continue-on-error: true

      # ── Go adapter ────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
        continue-on-error: true

      - name: Build Go adapter (Windows)
        working-directory: "${{ env.PLUGIN_DIR }}\\adapters\\go"
        run: go build -buildmode=c-shared -o polylang_go_adapter.dll ./polylang_go_adapter.go
        continue-on-error: true

      # ── Java (Kotlin adapter) ─────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
        continue-on-error: true

      # ── Python (Python adapter headers) ───────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        continue-on-error: true

      # ── CMake configure ───────────────────────────────────────────────────
      - name: Cache CMake build (Windows)
        uses: actions/cache@v4
        with:
          path: "${{ env.PLUGIN_DIR }}\\${{ env.BUILD_DIR }}"
          key: cmake-windows-${{ hashFiles('polylang plugin/CMakeLists.txt', 'polylang plugin/src/**', 'polylang plugin/include/**') }}-v2
          restore-keys: cmake-windows-

      - name: Verify or clean build cache
        run: |
          $genHeaders = "$env:PLUGIN_DIR\$env:BUILD_DIR\godot-cpp\gen\include"
          if (-not (Test-Path $genHeaders)) {
            Write-Host "Generated godot-cpp headers missing — clearing cmake cache to force full reconfigure"
            $buildDir = "$env:PLUGIN_DIR\$env:BUILD_DIR"
            if (Test-Path $buildDir) { Remove-Item $buildDir -Recurse -Force }
          } else {
            Write-Host "Generated headers present: $genHeaders"
          }

      - name: Configure (Windows x64)
        run: |
          $s = (Resolve-Path "$env:PLUGIN_DIR").Path.Replace('\', '/')
          $b = (Join-Path $s "$env:BUILD_DIR").Replace('\', '/')
          $vendor = $env:VENDOR_INSTALL.Replace('\', '/')
          
          $gcpp_inc = "$s/godot-cpp/include"
          $gcpp_gen = "$b/godot-cpp/gen/include"
          $lua_inc = "$vendor/include/lua5.4"
          $lua_lib = "$vendor/lib/lua5.4.lib"
          
          New-Item -ItemType Directory -Force -Path $b | Out-Null
          cmake `
            -S "$s" `
            -B "$b" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$vendor" `
            -DCMAKE_PROJECT_INCLUDE="$s/CMakeLists.windows.cmake" `
            -DGODOT_CPP_INCLUDE="$gcpp_inc" `
            -DGODOT_CPP_GEN_INCLUDE="$gcpp_gen" `
            -DLUA_INCLUDE_DIR="$lua_inc" `
            -DLUA_LIBRARIES="$lua_lib" `
            -DQUICKJS_INCLUDE="$vendor/include" `
            -DQUICKJS_LIB="$vendor/lib/quickjs.lib" `
            -DWREN_INC="$vendor/include" `
            -DWREN_LIB="$vendor/lib/wren.lib" `
            -DSQUIRREL_INC="$vendor/include" `
            -DSQUIRREL_LIB="$vendor/lib/squirrel.lib" `
            -DAS_INC="$vendor/include" `
            -DAS_LIB="$vendor/lib/angelscript.lib" `
            -DPL_ENABLE_HARDENING=OFF `
            -DPOLYLANG_BUILD_TESTS=OFF `
            -DPOLYLANG_BUILD_ODIN_TESTS=OFF `
            -DCMAKE_CXX_FLAGS='/FI"polylang_script_instance_msvc.hpp"'

      - name: Build (Windows x64)
        run: cmake --build "$env:PLUGIN_DIR\$env:BUILD_DIR" --config Release --parallel

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path pkg\addons\polylang\bin\windows | Out-Null

          # Core DLL
          $core = Get-ChildItem "$env:PLUGIN_DIR\$env:BUILD_DIR" -Recurse -Filter "polylang.dll" |
                    Select-Object -First 1
          if ($core) { Copy-Item $core.FullName pkg\addons\polylang\bin\windows\ }
          else        { Write-Warning "polylang.dll not found" }

          # Adapter DLLs
          Get-ChildItem "$env:PLUGIN_DIR\$env:BUILD_DIR" -Recurse -Filter "*.dll" |
            Where-Object { $_.Name -ne "polylang.dll" } |
            ForEach-Object { Copy-Item $_.FullName pkg\addons\polylang\bin\windows\ }

          # Pre-built Rust/Go if they succeeded
          $rd = "$env:PLUGIN_DIR\adapters\rust\target\release\polylang_adapter_rust.dll"
          $gd = "$env:PLUGIN_DIR\adapters\go\polylang_go_adapter.dll"
          if (Test-Path $rd) { Copy-Item $rd pkg\addons\polylang\bin\windows\ }
          if (Test-Path $gd) { Copy-Item $gd pkg\addons\polylang\bin\windows\ }

          # GDScript plugin files
          Copy-Item "$env:PLUGIN_DIR\addons\polylang\*" pkg\addons\polylang\ -Recurse -Force

          Write-Host "=== Windows package contents ==="
          Get-ChildItem pkg -Recurse | Select-Object FullName

          Compress-Archive -Path pkg\* -DestinationPath polylang-windows.zip

      - name: Causinator 9000 CI Diagnosis
        if: failure()
        uses: sylvainsf/causinator9000@v1.6.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polylang-windows
          path: polylang-windows.zip
          retention-days: 30
