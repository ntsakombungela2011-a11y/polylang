name: Vendor Dependencies

# Run this manually whenever you need to update vendored deps.
# It downloads every dependency, commits them into vendor/, and
# opens a PR so you can review before merging into main.
#
# godot-cpp is handled separately as a submodule — this workflow
# also ensures it is pinned to the correct tag.

on:
  workflow_dispatch:
    inputs:
      pr_branch:
        description: 'Branch name for the vendor PR'
        required: false
        default: 'chore/vendor-deps'
      godot_cpp_tag:
        description: 'godot-cpp tag to pin (e.g. godot-4.3-stable)'
        required: false
        default: 'godot-4.3-stable'
      lua_version:
        description: 'Lua version (e.g. 5.4.7)'
        required: false
        default: '5.4.7'
      quickjs_tag:
        description: 'QuickJS git tag/date'
        required: false
        default: '2024-01-13'
      wren_version:
        description: 'Wren version tag (e.g. 0.4.0)'
        required: false
        default: '0.4.0'
      squirrel_version:
        description: 'Squirrel version tag (e.g. v3.2)'
        required: false
        default: 'v3.2'
      angelscript_version:
        description: 'AngelScript version (e.g. 2.36.1)'
        required: false
        default: '2.36.1'
      nim_version:
        description: 'Nim version (e.g. 2.0.8)'
        required: false
        default: '2.0.8'
      julia_version:
        description: 'Julia version (e.g. 1.10.4)'
        required: false
        default: '1.10.4'

env:
  PLUGIN_DIR: "polylang plugin"

jobs:
  vendor:
    name: Download & Commit Vendored Deps
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── Checkout full repo including submodules ───────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # we handle godot-cpp manually below
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Create / reset vendor branch ──────────────────────────────────────
      - name: Create vendor branch
        run: |
          BRANCH="${{ inputs.pr_branch }}"
          git fetch origin || true
          if git ls-remote --exit-code origin "$BRANCH" > /dev/null 2>&1; then
            git checkout "$BRANCH"
            git reset --hard origin/main
          else
            git checkout -b "$BRANCH"
          fi

      # ══════════════════════════════════════════════════════════════════════
      # 1. godot-cpp — submodule pinned to exact tag
      # ══════════════════════════════════════════════════════════════════════
      - name: Pin godot-cpp submodule
        run: |
          TAG="${{ inputs.godot_cpp_tag }}"
          SUBMOD_PATH="$PLUGIN_DIR/godot-cpp"

          # Init submodule if it has never been cloned
          if [ ! -f "$SUBMOD_PATH/CMakeLists.txt" ]; then
            git submodule update --init --recursive -- "$SUBMOD_PATH"
          fi

          cd "$SUBMOD_PATH"
          git fetch --tags origin
          git checkout "$TAG"
          cd -

          git add "$SUBMOD_PATH"
          echo "godot-cpp pinned to $TAG"

      # ══════════════════════════════════════════════════════════════════════
      # 2. Lua
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor Lua ${{ inputs.lua_version }}
        run: |
          VER="${{ inputs.lua_version }}"
          DEST="vendor/lua"
          rm -rf "$DEST" && mkdir -p "$DEST"

          curl -sL "https://www.lua.org/ftp/lua-${VER}.tar.gz" \
            | tar -xz --strip-components=1 -C "$DEST"

          # Write a version pin file
          echo "$VER" > "$DEST/.vendor-version"

          git add "$DEST"
          echo "Lua $VER vendored → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 3. QuickJS
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor QuickJS ${{ inputs.quickjs_tag }}
        run: |
          TAG="${{ inputs.quickjs_tag }}"
          DEST="vendor/quickjs"
          rm -rf "$DEST" && mkdir -p "$DEST"

          # Sparse clone — we only need the specific files cmake uses
          git clone --depth 1 --branch "$TAG" \
            https://github.com/bellard/quickjs.git "$DEST" 2>/dev/null || \
          git clone --depth 1 \
            https://github.com/bellard/quickjs.git "$DEST"

          # Remove git metadata — it's vendored, not a submodule
          rm -rf "$DEST/.git"

          # ── Create POSIX shims for Windows/MSVC ────────────────────────
          # QuickJS's quickjs-libc.c requires several POSIX headers that are 
          # missing on Windows/MSVC. We provide minimal shims so it compiles.
          
          # 1. dirent.h (minimal implementation)
          cat > "$DEST/dirent.h" <<'EOF'
#ifndef MSVC_DIRENT_H
#define MSVC_DIRENT_H
#ifndef WIN32_LEAN_AND_MEAN
#define WIN32_LEAN_AND_MEAN
#endif
#include <windows.h>
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
struct dirent { char d_name[MAX_PATH]; };
typedef struct DIR { HANDLE h; WIN32_FIND_DATAA f; struct dirent e; int first; } DIR;
static inline DIR *opendir(const char *name) {
    DIR *d = (DIR *)malloc(sizeof(DIR));
    char p[MAX_PATH];
    snprintf(p, MAX_PATH, "%s\\*", name);
    d->h = FindFirstFileA(p, &d->f);
    if (d->h == INVALID_HANDLE_VALUE) { free(d); return NULL; }
    d->first = 1; return d;
}
static inline struct dirent *readdir(DIR *d) {
    if (d->first) d->first = 0; else if (!FindNextFileA(d->h, &d->f)) return NULL;
    strncpy(d->e.d_name, d->f.cFileName, MAX_PATH); return &d->e;
}
static inline int closedir(DIR *d) { FindClose(d->h); free(d); return 0; }
#endif
EOF

          # 2. unistd.h
          cat > "$DEST/unistd.h" <<'EOF'
#ifndef MSVC_UNISTD_H
#define MSVC_UNISTD_H
#include <io.h>
#ifndef WIN32_LEAN_AND_MEAN
#define WIN32_LEAN_AND_MEAN
#endif
#include <process.h>
#include <direct.h>
#include <windows.h>
#define STDIN_FILENO 0
#define STDOUT_FILENO 1
#define STDERR_FILENO 2
static inline void usleep(unsigned int us) { Sleep(us / 1000); }
#endif
EOF

          # 3. sys/time.h
          mkdir -p "$DEST/sys"
          cat > "$DEST/sys/time.h" <<'EOF'
#ifndef MSVC_SYS_TIME_H
#define MSVC_SYS_TIME_H
#ifndef WIN32_LEAN_AND_MEAN
#define WIN32_LEAN_AND_MEAN
#endif
#include <winsock2.h>
#include <windows.h>
#include <time.h>

#ifndef _TIMEVAL_DEFINED
#define _TIMEVAL_DEFINED
struct timeval { long tv_sec; long tv_usec; };
#endif

static inline int gettimeofday(struct timeval *tp, void *tzp) {
    if (tp) {
        FILETIME ft; unsigned __int64 t;
        GetSystemTimeAsFileTime(&ft);
        t = ((unsigned __int64)ft.dwHighDateTime << 32) | (unsigned __int64)ft.dwLowDateTime;
        t -= 116444736000000000LL;
        tp->tv_sec = (long)(t / 10000000ULL);
        tp->tv_usec = (long)((t % 10000000ULL) / 10ULL);
    }
    return 0;
}
#endif
EOF

          # 4. sys/wait.h
          cat > "$DEST/sys/wait.h" <<'EOF'
#ifndef MSVC_SYS_WAIT_H
#define MSVC_SYS_WAIT_H
#define WIFEXITED(s) (1)
#define WEXITSTATUS(s) (s)
#define WIFSIGNALED(s) (0)
#define WTERMSIG(s) (0)
#endif
EOF

          # 5. pthread.h
          cat > "$DEST/pthread.h" <<'EOF'
#ifndef MSVC_PTHREAD_H
#define MSVC_PTHREAD_H
#ifndef WIN32_LEAN_AND_MEAN
#define WIN32_LEAN_AND_MEAN
#endif
#include <windows.h>
#include <time.h>
#ifndef _TIMESPEC_DEFINED
#define _TIMESPEC_DEFINED
struct timespec { time_t tv_sec; long tv_nsec; };
#endif
typedef void* pthread_t;
typedef void* pthread_mutex_t;
typedef void* pthread_cond_t;
typedef void* pthread_attr_t;
typedef void* pthread_mutexattr_t;
typedef void* pthread_condattr_t;
static inline int pthread_mutex_init(pthread_mutex_t* m, void* a) { return 0; }
static inline int pthread_mutex_destroy(pthread_mutex_t* m) { return 0; }
static inline int pthread_mutex_lock(pthread_mutex_t* m) { return 0; }
static inline int pthread_mutex_unlock(pthread_mutex_t* m) { return 0; }
static inline int pthread_cond_init(pthread_cond_t* c, void* a) { return 0; }
static inline int pthread_cond_destroy(pthread_cond_t* c) { return 0; }
static inline int pthread_cond_signal(pthread_cond_t* c) { return 0; }
static inline int pthread_cond_broadcast(pthread_cond_t* c) { return 0; }
static inline int pthread_cond_wait(pthread_cond_t* c, pthread_mutex_t* m) { return 0; }
static inline int pthread_create(pthread_t* t, void* a, void* (*f)(void*), void* p) { return 0; }
static inline int pthread_join(pthread_t t, void** r) { return 0; }
#endif
EOF

          echo "$TAG" > "$DEST/.vendor-version"
          git add "$DEST"
          echo "QuickJS $TAG vendored → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 4. Wren
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor Wren ${{ inputs.wren_version }}
        run: |
          VER="${{ inputs.wren_version }}"
          DEST="vendor/wren"
          rm -rf "$DEST" && mkdir -p "$DEST"

          curl -sL "https://github.com/wren-lang/wren/archive/refs/tags/${VER}.tar.gz" \
            | tar -xz --strip-components=1 -C "$DEST"

          echo "$VER" > "$DEST/.vendor-version"
          git add "$DEST"
          echo "Wren $VER vendored → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 5. Squirrel
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor Squirrel ${{ inputs.squirrel_version }}
        run: |
          TAG="${{ inputs.squirrel_version }}"
          DEST="vendor/squirrel"
          rm -rf "$DEST" && mkdir -p "$DEST"

          curl -sL "https://github.com/albertodemichelis/squirrel/archive/refs/tags/${TAG}.tar.gz" \
            | tar -xz --strip-components=1 -C "$DEST"

          echo "$TAG" > "$DEST/.vendor-version"
          git add "$DEST"
          echo "Squirrel $TAG vendored → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 6. AngelScript
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor AngelScript ${{ inputs.angelscript_version }}
        run: |
          VER="${{ inputs.angelscript_version }}"
          DEST="vendor/angelscript"
          rm -rf "$DEST" && mkdir -p "$DEST"

          curl -sL "https://www.angelcode.com/angelscript/sdk/files/angelscript_${VER}.zip" \
            -o /tmp/angelscript.zip
          unzip -q /tmp/angelscript.zip -d /tmp/angelscript_extracted
          # The zip contains an sdk/ folder — move just that
          cp -r /tmp/angelscript_extracted/sdk/. "$DEST/"
          rm -rf /tmp/angelscript.zip /tmp/angelscript_extracted

          # Compute and save the sha256 for the vendor/CMakeLists.txt placeholder
          SHA=$(sha256sum /tmp/angelscript.zip 2>/dev/null || \
                curl -sL "https://www.angelcode.com/angelscript/sdk/files/angelscript_${VER}.zip" \
                | sha256sum | awk '{print $1}')
          echo "$VER" > "$DEST/.vendor-version"
          echo "SHA256: $SHA" >> "$DEST/.vendor-version"

          git add "$DEST"
          echo "AngelScript $VER vendored → $DEST"
          echo "AngelScript SHA256: $SHA"
          echo "ANGELSCRIPT_SHA256=$SHA" >> $GITHUB_ENV

      # ══════════════════════════════════════════════════════════════════════
      # 7. Nim — version pin only (binary tarball ~110 MB, too large for Git)
      #    Downloaded and cached at build time by the build workflows.
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor Nim version pin ${{ inputs.nim_version }}
        run: |
          VER="${{ inputs.nim_version }}"
          DEST="vendor/nim-version"
          rm -rf "$DEST" && mkdir -p "$DEST"

          echo "$VER" > "$DEST/VERSION"
          echo "https://nim-lang.org/download/nim-${VER}-linux_x64.tar.xz" > "$DEST/DOWNLOAD_URL"

          cat > "$DEST/README.md" << 'EOF'
          # Nim Version Pin
          Nim binary (~110 MB) is too large to commit to Git directly.
          Build workflows download and cache it using the version in VERSION.
          To update: re-run the Vendor Dependencies workflow with a new nim_version.
          EOF

          git add "$DEST"
          echo "Nim $VER version pin written → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 8. Julia — version pin only (binary is too large for GitHub: sys.so
      #    is 251 MB which exceeds the 100 MB hard limit). The build workflows
      #    download and cache Julia at build time using this pinned version.
      # ══════════════════════════════════════════════════════════════════════
      - name: Vendor Julia version pin ${{ inputs.julia_version }}
        run: |
          VER="${{ inputs.julia_version }}"
          DEST="vendor/julia-version"
          rm -rf "$DEST" && mkdir -p "$DEST"

          # Write a version pin file — the build workflows read this and
          # download the correct Julia binary themselves, caching it in CI.
          cat > "$DEST/VERSION" <<EOF
          $VER
          EOF

          # Also write the download URL so the build workflows don't have to
          # reconstruct it from the version number
          MAJOR_MINOR=$(echo "$VER" | cut -d. -f1-2)
          cat > "$DEST/DOWNLOAD_URL" <<EOF
          https://julialang-s3.julialang.org/bin/linux/x64/${MAJOR_MINOR}/julia-${VER}-linux-x86_64.tar.gz
          EOF

          cat > "$DEST/README.md" <<EOF
          # Julia Version Pin

          Julia cannot be vendored directly into Git — the binary distribution
          contains files exceeding GitHub's 100 MB hard limit (sys.so is ~252 MB).

          **Pinned version:** $VER
          **Download URL:** see DOWNLOAD_URL file

          The build workflows (build-linux.yml) download Julia at build time
          and cache it using the version string as the cache key.
          To update Julia: re-run the Vendor Dependencies workflow with a new
          \`julia_version\` input.
          EOF

          git add "$DEST"
          echo "Julia $VER version pin written → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 9. hxcpp (Haxe + haxelib)
      # ══════════════════════════════════════════════════════════════════════
      - name: Install Haxe and vendor hxcpp
        run: |
          DEST="vendor/hxcpp"
          rm -rf "$DEST" && mkdir -p "$DEST"

          # Install Haxe toolchain (needed to run haxelib)
          sudo apt-get install -y --no-install-recommends haxe neko
          mkdir -p ~/haxelib && haxelib setup ~/haxelib

          # Pull hxcpp via haxelib
          haxelib install hxcpp

          # Copy the installed hxcpp into vendor/
          HXCPP_PATH=$(haxelib path hxcpp | head -1)
          cp -r "$HXCPP_PATH/." "$DEST/"

          # Record version
          HXCPP_VER=$(haxelib list | grep hxcpp | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "${HXCPP_VER:-latest}" > "$DEST/.vendor-version"

          git add "$DEST"
          echo "hxcpp vendored → $DEST"

      # ══════════════════════════════════════════════════════════════════════
      # 10. Patch vendor/CMakeLists.txt with real AngelScript SHA256
      # ══════════════════════════════════════════════════════════════════════
      - name: Patch AngelScript SHA256 in vendor/CMakeLists.txt
        run: |
          SHA="${{ env.ANGELSCRIPT_SHA256 }}"
          if [ -n "$SHA" ] && [ -f "vendor/CMakeLists.txt" ]; then
            # Replace the placeholder hash line
            sed -i "s|URL_HASH SHA256=c0c833c1c95b7d8c9b4f6c9c9d9e3d3c9f9e9b9a9d9c9b9a8d8c8b8a8d8c8b8.*|URL_HASH SHA256=${SHA}|" \
              vendor/CMakeLists.txt
            git add vendor/CMakeLists.txt
            echo "Patched AngelScript SHA256 → $SHA"
          fi

      # ── Update vendor/README.md with pinned versions ──────────────────────
      - name: Update vendor README with pinned versions
        run: |
          cat > vendor/README.md <<EOF
          # PolyLang — Vendored Dependencies

          Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')

          | Dependency | Version | Location |
          |------------|---------|----------|
          | godot-cpp | ${{ inputs.godot_cpp_tag }} | \`polylang plugin/godot-cpp\` (submodule) |
          | Lua | ${{ inputs.lua_version }} | \`vendor/lua/\` |
          | QuickJS | ${{ inputs.quickjs_tag }} | \`vendor/quickjs/\` |
          | Wren | ${{ inputs.wren_version }} | \`vendor/wren/\` |
          | Squirrel | ${{ inputs.squirrel_version }} | \`vendor/squirrel/\` |
          | AngelScript | ${{ inputs.angelscript_version }} | \`vendor/angelscript/\` |
          | Nim | ${{ inputs.nim_version }} | \`vendor/nim/\` |
          | Julia | ${{ inputs.julia_version }} | \`vendor/julia/\` |
          | hxcpp | latest | \`vendor/hxcpp/\` |

          ## godot-cpp
          Managed as a git submodule at \`polylang plugin/godot-cpp\`.
          Pinned to tag \`${{ inputs.godot_cpp_tag }}\` — must match your Godot engine version.
          To update: run this workflow again with a different \`godot_cpp_tag\`.

          ## Updating a dependency
          Re-run this workflow (Actions → Vendor Dependencies → Run workflow)
          with the new version numbers. It will reset the vendor branch and open
          a fresh PR.
          EOF

          git add vendor/README.md

      # ── Commit everything ─────────────────────────────────────────────────
      - name: Commit vendored deps
        run: |
          git diff --cached --quiet && echo "Nothing changed" && exit 0

          git commit -m "chore: vendor all dependencies

          godot-cpp : ${{ inputs.godot_cpp_tag }} (submodule)
          Lua       : ${{ inputs.lua_version }}
          QuickJS   : ${{ inputs.quickjs_tag }}
          Wren      : ${{ inputs.wren_version }}
          Squirrel  : ${{ inputs.squirrel_version }}
          AngelScript: ${{ inputs.angelscript_version }}
          Nim       : ${{ inputs.nim_version }} (pin only — binary too large for Git)
          Julia     : ${{ inputs.julia_version }} (pin only — binary too large for Git)
          hxcpp     : latest

          Generated by the Vendor Dependencies workflow.
          "

      # ── Push branch ───────────────────────────────────────────────────────
      - name: Push vendor branch
        run: |
          git push origin "${{ inputs.pr_branch }}" --force

      # ── Open PR ───────────────────────────────────────────────────────────
      - name: Open Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ inputs.pr_branch }}';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length > 0) {
              console.log(`PR already exists: ${prs[0].html_url}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'chore: vendor all dependencies',
              head:  branch,
              base:  'main',
              body: `## Vendored Dependencies

            This PR was generated automatically by the **Vendor Dependencies** workflow.

            | Dependency | Version |
            |------------|---------|
            | godot-cpp | ${{ inputs.godot_cpp_tag }} |
            | Lua | ${{ inputs.lua_version }} |
            | QuickJS | ${{ inputs.quickjs_tag }} |
            | Wren | ${{ inputs.wren_version }} |
            | Squirrel | ${{ inputs.squirrel_version }} |
            | AngelScript | ${{ inputs.angelscript_version }} |
            | Nim | ${{ inputs.nim_version }} (version pin) |
            | Julia | ${{ inputs.julia_version }} (version pin) |
            | hxcpp | latest |

            ### Before merging
            - [ ] Check the \`vendor/README.md\` versions look correct
            - [ ] Verify the AngelScript SHA256 was patched in \`vendor/CMakeLists.txt\`
            - [ ] Trigger a test build on this branch to confirm everything compiles
            `,
            });

            console.log(`PR opened: ${pr.html_url}`);
